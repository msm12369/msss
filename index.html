<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title>credosdev</title>
    <meta content="Credos Project" name="title">
    <meta content="credosdev | Software Developer — Links & socials." name="description">
    <meta content="website" property="og:type">
    <meta content="https://credos.qzz.io/" property="og:url">
    <meta content="Credos Project" property="og:title">
    <meta content="credosdev | Software Developer — Links & socials." property="og:description">
    <meta content="https://cdn.discordapp.com/embed/avatars/4.png" property="og:image">
    <meta content="summary_large_image" property="twitter:card">
    <meta content="https://credos.qzz.io/" property="twitter:url">
    <meta content="Credos Project" property="twitter:title">
    <meta content="credosdev | Software Developer — Links & socials." property="twitter:description">
    <meta content="https://cdn.discordapp.com/embed/avatars/4.png" property="twitter:image">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        html, body {
            background-color: #000 !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <video autoplay id="bg-video" loop muted playsinline>
        <source src="https://credosdata.qzz.io/assets/back1.mp4" type="video/mp4">
    </video>
    <canvas id="snow-canvas"></canvas>
    <div id="enter-screen" onclick="launch()">
        <span>click to enter...</span>
    </div>
    <div class="volume-container" id="vol-ui">
        <div id="mute-btn" onclick="toggleMute()">
            <i class="fas fa-volume-up"></i>
        </div>
        <div class="slider-wrapper">
            <input id="vol-slider" max="100" min="0" type="range" value="100">
        </div>
    </div>
    <div class="main-ui" id="main-ui">
        <div class="profile-card tilt-card">
            <div class="avatar-wrap">
                <img alt="avatar" id="avatar-img" src="https://cdn.discordapp.com/embed/avatars/4.png">
                <img alt="frame" class="avatar-frame" src="https://credosdata.qzz.io/assets/angry.png">
                <div class="status-dot" id="status-dot"><img src="https://credosdata.qzz.io/assets/offline.png" alt="offline"></div>
            </div>
            <div class="username-big">credosdev</div>
            <div class="username-small">C# & Python Developer</div>
            <div class="socials">
                <a href="https://github.com/cdexecctru" target="_blank">
                    <span class="btn-tip">Open GitHub</span>
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://www.instagram.com/credosdev" target="_blank">
                    <span class="btn-tip">Open Instagram</span>
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://discord.com/users/1512730348554027141" target="_blank">
                    <span class="btn-tip">Open Discord</span>
                    <i class="fab fa-discord"></i>
                </a>
            </div>
            <div class="rpc-card" id="rpc-card">
                <span class="rpc-empty">— no activity —</span>
            </div>
            <div class="eye-count">
                <span class="eye-tip">Profile Views</span>
                <svg fill="none" height="14" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                <span id="vis-count">Loading...</span>
            </div>
        </div>
    </div>
    <div class="copy-toast" id="copy-toast">copied.</div>
    <script src="https://credosdata.qzz.io/obfuscated/script.js"></script>
</body>
</html>
