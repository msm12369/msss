<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>msm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: #0f0f1a;           /* Daha güzel koyu gri-mavi ton */
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(25, 25, 40, 0.95);   /* Yumuşak koyu gri */
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    .avatar {
      border: 4px solid #ff00aa;
    }
    .main-container {
      width: 100%;
      max-width: 1100px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Sol Üst - Profil Kartı -->
      <div class="lg:col-span-2 card rounded-3xl p-6">
        <div class="flex gap-6">
          <div class="relative flex-shrink-0">
            <img src="https://cdn.discordapp.com/avatars/1008802161104261250/be7cb688d508a3f825f38cb9558d7043.png"
                 alt="avatar" class="w-32 h-32 rounded-2xl avatar object-cover">
            <div class="absolute -bottom-1 -right-1 bg-red-600 text-white text-xs rounded-full px-2 py-1 flex items-center gap-1">
              <i class="fas fa-circle text-xs"></i>
            </div>
          </div>
          <div class="flex-1">
            <div class="flex items-center gap-3">
              <h1 class="text-3xl font-bold">msm</h1>
              <span class="text-emerald-400 text-sm">● Çevrimiçi</span>
            </div>
            <p class="text-gray-400">@msm</p>
            <p class="mt-3 text-lg">"..."</p>
           
            <div class="flex gap-4 mt-6 text-2xl">
              <i class="fab fa-discord hover:text-indigo-400 cursor-pointer"></i>
              <i class="fab fa-spotify hover:text-green-400 cursor-pointer"></i>
              <i class="fab fa-github hover:text-gray-300 cursor-pointer"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Spotify Kartı -->
      <div class="card rounded-3xl p-6 flex flex-col">
        <div class="flex items-center justify-between mb-4">
          <p class="text-lg font-semibold flex items-center gap-2">
            <i class="fab fa-spotify text-green-400"></i>
            Listening to Spotify
          </p>
        </div>
        
        <div id="spotify-content" class="flex-1 flex flex-col items-center justify-center text-center min-h-[220px]">
          <p class="text-gray-400">Bağlantı kuruluyor...</p>
        </div>
      </div>

      <!-- Hakkımda -->
      <div class="lg:col-span-3 card rounded-3xl p-6">
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
          About Me
          <span class="text-xs bg-purple-600 px-2 py-1 rounded">18</span>
        </h2>
       
        <div class="mb-6">
          <p class="text-sm text-gray-400">Who am I?</p>
          <p class="text-lg">i'm <span class="text-pink-400">msm</span> - a guy who likes playing games with his friends</p>
        </div>
        <div>
          <p class="text-sm text-gray-400 mb-3">My Interests</p>
          <p class="text-gray-300">"i like listening some music, i also enjoy gaming and wasting my time on the internet</p>
        </div>
        
        <div class="grid grid-cols-5 gap-3 mt-8">
          <img src="https://imgur.com/a/6NCHQ6o" class="rounded-lg hover:scale-105 transition-transform">
          <img src="https://imgur.com/a/QVBSgWo" class="rounded-lg hover:scale-105 transition-transform">
          <img src="https://imgur.com/0XW7Kjt" class="rounded-lg hover:scale-105 transition-transform">
          <img src="https://imgur.com/Dn98Qww" class="rounded-lg hover:scale-105 transition-transform">
          <img src="https://imgur.com/FVKPTAI" class="rounded-lg hover:scale-105 transition-transform">
        </div>
      </div>

    </div>
  </div>

  <!-- Spotify Script (Port 8974) -->
  <script>
    const socket = new WebSocket('ws://127.0.0.1:8974/');

    socket.onopen = () => {
      console.log('✅ Websocket Bağlandı');
      document.getElementById('spotify-content').innerHTML = `
        <p class="text-green-400">✅ Bağlantı kuruldu! Şarkı çal...</p>`;
    };

    socket.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.title && data.artist) {
          document.getElementById('spotify-content').innerHTML = `
            <img src="${data.albumArt || ''}" class="w-40 h-40 rounded-2xl mb-5 shadow-2xl object-cover">
            <p class="font-bold text-xl">${data.title}</p>
            <p class="text-gray-400">${data.artist}</p>
            <div class="w-full max-w-xs bg-gray-700 h-1.5 rounded-full mt-6 overflow-hidden">
              <div class="bg-green-500 h-1.5 rounded-full transition-all" style="width: ${data.progressPercent || 0}%"></div>
            </div>
          `;
        }
      } catch (e) {}
    };

    socket.onerror = () => {
      document.getElementById('spotify-content').innerHTML = `
        <p class="text-yellow-400">Websocket bağlanamadı<br>
        <span class="text-sm">Port 8974 kontrol et</span></p>`;
    };
  </script>
</body>
</html>
