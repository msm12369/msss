<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>msm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      color-scheme: dark;
      --bg-dark: #0d1117;
      --bg-gradient-mid: #1a1f2e;
      --bg-gradient-end: #161b22;
      --card-bg: rgba(22, 27, 34, 0.6);
      --card-bg-solid: rgb(22, 27, 34);
      --badge-bg: rgba(25, 31, 41, 0.5);
      --overlay-bg: rgba(22, 27, 34, 1);
    }
    body {
      background: linear-gradient(to bottom, var(--bg-dark), var(--bg-gradient-mid), var(--bg-gradient-end));
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }
    .main-container {
      width: 100%;
      max-width: 1100px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <div class="lg:col-span-2 card rounded-3xl relative overflow-hidden flex flex-col justify-between">
        
        <div class="w-full h-40 relative bg-zinc-800">
          <img src="https://i.imgur.com/EpKmdiP.png" 
               alt="banner" class="w-full h-full object-cover opacity-80">
          
          <div class="absolute top-4 right-4 bg-black/60 border border-white/10 pl-3 pr-1 py-1 rounded-full flex items-center gap-2 text-sm text-gray-300 backdrop-blur-md select-none z-20">
            <i class="far fa-eye text-cyan-400"></i>
            <img src="https://credos.qzz.io/api/counter/msm" alt="views" class="h-6 object-contain pointer-events-none brightness-110">
          </div>
        </div>

        <div class="p-6 pt-0 relative flex flex-col gap-6">
          
          <div class="flex flex-col sm:flex-row gap-6 items-start sm:items-end -mt-16 relative z-10">
            
            <div class="relative flex-shrink-0 w-32 h-32 rounded-full ring-4 ring-[#161b22] shadow-xl bg-[#0d1117]">
              <img src="https://cdn.discordapp.com/avatars/1008802161104261250/be7cb688d508a3f825f38cb9558d7043.png"
                   alt="avatar" class="w-full h-full rounded-full object-cover">
              <div class="absolute bottom-1 right-1 w-7 h-7 rounded-full border border-zinc-800 bg-[#0d1117] flex items-center justify-center overflow-hidden z-10 shadow-md">
                <img id="status-icon" src="https://credosdata.qzz.io/assets/offline.png" alt="status" class="w-full h-full object-cover">
              </div>
            </div>

            <div class="flex-1 mb-2">
              <div class="flex items-center gap-3">
                <h1 class="text-3xl font-bold">msm</h1>
                <span id="text-status" class="text-gray-400 text-sm">● Offline</span>
              </div>
              <p class="text-gray-400">@msm</p>
              <p class="mt-2 text-lg">"..."</p>
            </div>

            <div class="flex gap-4 text-2xl mb-2 self-start sm:self-end">
              <a href="https://discord.com/users/1008802161104261250" target="_blank">
                <i class="fab fa-discord hover:text-indigo-400 cursor-pointer"></i>
              </a>
              <a href="https://reddit.com/user/Far_Current_3160/" target="_blank">
                <i class="fab fa-reddit-alien hover:text-orange-400 cursor-pointer"></i>
              </a>
              <i class="fab fa-github hover:text-gray-300 cursor-pointer"></i>
            </div>

          </div>

          <div id="discord-activity-container" class="border-t border-white/5 pt-4">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 flex items-center gap-1.5">
              <i class="fab fa-discord text-indigo-400"></i> Discord Activity
            </p>
            <div id="activity-detail" class="flex items-center gap-3 bg-zinc-900/30 p-3 rounded-2xl border border-white/[0.03]">
              <div class="w-full py-1 text-center text-gray-500 text-sm animate-pulse">Loading activity...</div>
            </div>
          </div>

        </div>
      </div>

      <div class="card rounded-3xl p-6 flex flex-col">
        <div class="flex items-center justify-between mb-4">
          <p id="spotify-header" class="text-lg font-semibold flex items-center gap-2">
            <i class="fab fa-spotify text-green-400"></i>
            Listening to Spotify
          </p>
        </div>
        
        <div id="spotify-content" class="flex-1 flex flex-col items-center justify-center text-center min-h-[220px]">
          <p class="text-gray-400">Connecting to Spotify...</p>
        </div>
      </div>

      <div class="lg:col-span-3 card rounded-3xl p-6">
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
          About Me
        </h2>
      
        <div class="mb-6">
          <p class="text-sm text-gray-400">Who am I?</p>
          <p class="text-lg">i'm <span class="text-purple-400">msm</span> - I love playing games with his friends</p>
        </div>
        <div>
          <p class="text-sm text-gray-400 mb-3">My Interests</p>
          <p class="text-gray-300">"i like listening some music, i also enjoy gaming and wasting my time on the internet</p>
        </div>
      
        <div class="grid grid-cols-5 gap-3 mt-8">
          <img src="https://imgur.com/FVKPTAI" class="rounded-lg hover:scale-105 transition-transform">
          <img src="https://imgur.com/FVKPTAI" class="rounded-lg hover:scale-105 transition-transform">
          <img src="https://imgur.com/FVKPTAI" class="rounded-lg hover:scale-105 transition-transform">
          <img src="https://imgur.com/FVKPTAI" class="rounded-lg hover:scale-105 transition-transform">
          <img src="https://imgur.com/FVKPTAI" class="rounded-lg hover:scale-105 transition-transform">
        </div>
      </div>

    </div>
  </div>

  <script>
    // 1. Ziyaretçi Sayacı Tetikleyicisi (Sadece Sayacı Arka Planda Arttırır)
    function handleCounter() {
      const hasVisited = localStorage.getItem('msm_visited');
      if (!hasVisited) {
        const triggerImg = new Image();
        triggerImg.src = 'https://credos.qzz.io/api/counter/msm/up?' + new Date().getTime();
        localStorage.setItem('msm_visited', 'true');
      }
    }

    // 2. Lanyard API Veri Çekme Alanı
    async function fetchLanyardData() {
      try {
        const response = await fetch('https://api.lanyard.rest/v1/users/1008802161104261250');
        const result = await response.json();
        
        if (result.success && result.data) {
          const data = result.data;
          
          // Discord Durum Kontrolü
          const status = data.discord_status || 'offline';
          const statusIconEl = document.getElementById('status-icon');
          const textStatusEl = document.getElementById('text-status');
          
          statusIconEl.src = `https://credosdata.qzz.io/assets/${status}.png`;
          
          if (status === 'online') {
            textStatusEl.textContent = '● Online';
            textStatusEl.className = 'text-emerald-400 text-sm';
          } else if (status === 'dnd') {
            textStatusEl.textContent = '● Do Not Disturb';
            textStatusEl.className = 'text-red-400 text-sm';
          } else if (status === 'idle') {
            textStatusEl.textContent = '● Idle';
            textStatusEl.className = 'text-amber-400 text-sm';
          } else {
            textStatusEl.textContent = '● Offline';
            textStatusEl.className = 'text-gray-400 text-sm';
          }

          // Spotify Kontrolü (Sağ taraftaki bağımsız kart)
          const spotifyContent = document.getElementById('spotify-content');
          const spotifyHeader = document.getElementById('spotify-header');

          if (data.listening_to_spotify && data.spotify) {
            spotifyHeader.innerHTML = `<i class="fab fa-spotify text-green-400"></i> Listening to Spotify`;
            
            const rawTrack = data.spotify.track || "";
            const lastWordOfTrack = rawTrack.trim().split(' ').pop();

            spotifyContent.innerHTML = `
              <img src="${data.spotify.album_art_url}" class="w-24 h-24 rounded-xl shadow-lg mb-3 object-cover animate-pulse" alt="Album Art">
              <p class="font-semibold text-white text-base line-clamp-1">${lastWordOfTrack}</p>
              <p class="text-sm text-gray-400 line-clamp-1">by ${data.spotify.artist}</p>
            `;
          } else {
            spotifyHeader.innerHTML = `<i class="fab fa-spotify text-gray-500"></i> Spotify`;
            spotifyContent.innerHTML = `<p class="text-gray-400">Not listening to anything</p>`;
          }

          // 3. Profil Altı Discord Aktivite Yönetimi (Filtrelenmiş)
          const activityDetail = document.getElementById('activity-detail');

          const validActivities = data.activities ? data.activities.filter(act => act.type !== 4 && act.name.toLowerCase() !== 'spotify' && act.type !== 2) : [];

          if (validActivities.length > 0) {
            const activeGame = validActivities[0];
            
            let assetImageHTML = `<div class="w-12 h-12 rounded-xl bg-zinc-800 flex items-center justify-center border border-white/5"><i class="fas fa-gamepad text-lg text-gray-400"></i></div>`;
            
            if (activeGame.assets && activeGame.assets.large_image) {
              let imageUrl = '';
              if (activeGame.assets.large_image.startsWith('mp:external')) {
                imageUrl = `https://media.discordapp.net/${activeGame.assets.large_image.replace('mp:external/', '')}`;
              } else {
                imageUrl = `https://cdn.discordapp.com/app-assets/${activeGame.application_id}/${activeGame.assets.large_image}.png`;
              }
              assetImageHTML = `<img src="${imageUrl}" class="w-12 h-12 rounded-xl object-cover border border-white/5" alt="Activity Asset">`;
            }

            const detailsText = activeGame.details || 'Playing';
            const stateText = activeGame.state ? `<p class="text-xs text-gray-500 line-clamp-1">${activeGame.state}</p>` : '';

            activityDetail.innerHTML = `
              ${assetImageHTML}
              <div class="flex-1 min-w-0 text-left">
                <p class="text-sm font-semibold text-white truncate">${activeGame.name}</p>
                <p class="text-xs text-gray-400 truncate">${detailsText}</p>
                ${stateText}
              </div>
            `;
          } else {
            activityDetail.innerHTML = `
              <div class="w-full py-1 text-center flex items-center justify-center gap-2 text-gray-500 text-sm">
                <i class="fas fa-moon opacity-60"></i>
                <span>No activity</span>
              </div>
            `;
          }
        }
      } catch (error) {
        console.error('Lanyard verisi çekilirken hata oluştu:', error);
      }
    }

    handleCounter();
    fetchLanyardData();
    setInterval(fetchLanyardData, 10000);
  </script>
</body>
</html>
